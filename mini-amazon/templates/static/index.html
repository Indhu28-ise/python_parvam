{% extends 'base.html' %}
{% block content %}
<h1>Products</h1>
{% for product in products %}
  <div class="product">
    <h3>{{ product.name }}</h3>
    <p>{{ product.description or 'No description available.' }}</p>
    <p><strong>Price:</strong> ₹{{ '%.2f'|format(product.price or 0) }}</p>
    <a href="{{ url_for('add_to_cart', product_id=product.id) }}">Add to Cart</a>
  </div>
{% else %}
  <p>No products found.</p>
{% endfor %}
{% endblock %}
